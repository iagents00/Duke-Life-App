name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - claude/vercel-deployment-link-o4js32
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Guard - require VERCEL_TOKEN secret
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing repo secret VERCEL_TOKEN. Add it in Settings > Secrets and variables > Actions, then re-run."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Optional Supabase keys for real data; falls back to demo mode if unset.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -e
          URL=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "Deployment URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "## ✅ Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Live URL: $URL" >> "$GITHUB_STEP_SUMMARY"
